<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Revista Digital</title>

  <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>

  <style>
    html, body {
      margin:0;
      padding:0;
      height:100%;
      overscroll-behavior: none;
    }

    body{
      background: radial-gradient(circle at 50% 35%, #1a1a1a 0%, #0b0b0b 55%, #070707 100%);
      height:100dvh;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
      color: rgba(255,255,255,.9);
    }

    #wrap{
      width: min(1200px, 96vw);
      height:100dvh;
      display:flex;
      align-items:center;
      justify-content:center;
      position: relative;
      padding: 10px 0;
      box-sizing: border-box;
    }

    #book{
      width: min(92vw, 1200px);
      height: min(92dvh, 860px);
      filter:
        drop-shadow(0 26px 70px rgba(0,0,0,.70))
        drop-shadow(0 10px 18px rgba(0,0,0,.45));
    }

    /* ✅ SOLO bordes redondeados, sin “marco papel” */
    .page{
      background:#000;          /* por si hay micro-bordes durante el flip */
      border-radius: 16px;
      overflow: hidden;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.06);
    }

    /* ✅ Imagen full, rellena la página */
    .page img{
      width:100%;
      height:100%;
      object-fit: cover;        /* rellena (puede recortar un poquito) */
      display:block;
      user-select:none;
      -webkit-user-drag:none;
      pointer-events:none;
    }

    #pageIndicator{
      position:absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 13px;
      letter-spacing: .2px;
      background: rgba(0,0,0,.55);
      border: 1px solid rgba(255,255,255,.10);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      user-select: none;
      pointer-events: none;
    }

    @supports not (height: 100dvh) {
      body { height:100vh; }
      #wrap { height:100vh; }
      #book { height:min(92vh, 860px); }
    }
  </style>
</head>

<body>
  <div id="wrap">
    <div id="book">
      <div class="page"><img src="img/01.jpg" alt="Página 1"></div>
      <div class="page"><img src="img/02.jpg" alt="Página 2"></div>
      <div class="page"><img src="img/03.jpg" alt="Página 3"></div>
      <div class="page"><img src="img/04.jpg" alt="Página 4"></div>
      <div class="page"><img src="img/05.jpg" alt="Página 5"></div>
      <div class="page"><img src="img/06.jpg" alt="Página 6"></div>
      <div class="page"><img src="img/07.jpg" alt="Página 7"></div>
      <div class="page"><img src="img/08.jpg" alt="Página 8"></div>
      <div class="page"><img src="img/09.jpg" alt="Página 9"></div>
      <div class="page"><img src="img/10.jpg" alt="Página 10"></div>
      <div class="page"><img src="img/11.jpg" alt="Página 11"></div>
      <div class="page"><img src="img/12.jpg" alt="Página 12"></div>
    </div>

    <div id="pageIndicator">Página 1 / 12</div>
  </div>

  <script>
    window.addEventListener("load", () => {
      const bookEl = document.getElementById("book");
      const indicatorEl = document.getElementById("pageIndicator");
      const totalPages = document.querySelectorAll(".page").length;

      const pageFlip = new St.PageFlip(bookEl, {
        width: 540,
        height: 960,
        size: "stretch",

        minWidth: 320,
        maxWidth: 1400,
        minHeight: 568,
        maxHeight: 2000,

        showCover: true,

        maxShadowOpacity: 0.65,
        showPageCorners: true,
        flippingTime: 900,

        useMouseEvents: true,
        mobileScrollSupport: false,
        swipeDistance: 30,

        clickEventForward: true
      });

      pageFlip.loadFromHTML(document.querySelectorAll(".page"));

      function updateIndicator() {
        const idx = (pageFlip.getCurrentPageIndex ? pageFlip.getCurrentPageIndex() : 0);
        const current = Math.min(totalPages, Math.max(1, idx + 1));
        indicatorEl.textContent = `Página ${current} / ${totalPages}`;
      }

      if (pageFlip.on) {
        pageFlip.on("flip", updateIndicator);
        pageFlip.on("changeState", updateIndicator);
      }

      window.addEventListener("keydown", (e) => {
        if (e.key === "ArrowRight") { pageFlip.flipNext(); setTimeout(updateIndicator, 20); }
        if (e.key === "ArrowLeft")  { pageFlip.flipPrev(); setTimeout(updateIndicator, 20); }
      });

      updateIndicator();
    });
  </script>
</body>
</html>
